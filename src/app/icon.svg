<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 背景 -->
  <rect width="32" height="32" rx="8" fill="#faf9f6"/>
  
  <!-- クラスタ1: 青（プラズマ・核融合）右上 -->
  <circle cx="22" cy="8" r="3.5" fill="rgba(59,130,246,0.25)"/>
  <circle cx="22" cy="8" r="2" fill="#3b82f6"/>
  <circle cx="27" cy="11" r="1.5" fill="#3b82f6" opacity="0.7"/>

  <!-- クラスタ2: 緑（材料・照射）左上 -->
  <circle cx="9" cy="9" r="3.5" fill="rgba(34,197,94,0.25)"/>
  <circle cx="9" cy="9" r="2" fill="#22c55e"/>
  <circle cx="13" cy="7" r="1.5" fill="#22c55e" opacity="0.7"/>

